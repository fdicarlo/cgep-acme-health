name: grc-gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform

jobs:
  grc-gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Install OPA + Conftest
        run: |
          curl -L -o conftest.tar.gz \
          https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz

          tar -xzf conftest.tar.gz
          sudo mv conftest /usr/local/bin/

          curl -L -o opa \
          https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static

          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform init -input=false
          terraform validate

          terraform plan \
            -out=tfplan \
            -no-color

          terraform show -json tfplan > plan.json

      - name: Run OPA tests
        run: |
          opa test -v policies/

      - name: HIPAA policy gate
        run: |

          for ns in \
          compliance.hipaa.s3_kms \
          compliance.hipaa.dynamodb_kms \
          compliance.hipaa.s3_tls \
          compliance.hipaa.s3_versioning \
          compliance.hipaa.iam_least_privilege \
          compliance.hipaa.api_logging
          do
            echo "=== $ns ==="

            conftest test \
              --policy policies \
              --namespace "$ns" \
              terraform/plan.json
          done